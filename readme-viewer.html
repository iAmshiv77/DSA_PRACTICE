<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Study Material — README Viewer</title>
  <!-- Markdown parser + GitHub-style CSS (from CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
  <style>
    body {
      margin: 0;
      background: #f6f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .topbar {
      background: #24292f;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .topbar button, .topbar label {
      background: #2da44e;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .topbar label:hover, .topbar button:hover { background: #2c974b; }
    .container {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .markdown-body {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 40px;
    }
    .hint {
      color: #57606a;
      font-size: 13px;
      margin-left: auto;
    }
    #drop {
      border: 2px dashed #d0d7de;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      color: #57606a;
      background: #fff;
      margin-bottom: 16px;
    }
    #drop.hide { display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📚 README Viewer</h1>
    <label>📂 Open a .md file
      <input id="file" type="file" accept=".md,.markdown,text/markdown" hidden />
    </label>
    <button id="reload">🔄 Reload README.md</button>
    <span class="hint">Tip: drag &amp; drop any .md file onto the page</span>
  </div>

  <div class="container">
    <div id="drop">Couldn't auto-load <code>README.md</code> (browsers block local file reads from <code>file://</code>).<br>
      Click <b>“Open a .md file”</b> above, or drag a <code>.md</code> file here.</div>
    <article id="content" class="markdown-body">Loading…</article>
  </div>

  <script>
    const content = document.getElementById('content');
    const drop = document.getElementById('drop');

    function render(md) {
      content.innerHTML = marked.parse(md);
      drop.classList.add('hide');
    }

    // 1) Try to auto-fetch README.md (works when served over http, e.g. a local server)
    function tryFetch() {
      fetch('README.md')
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .then(render)
        .catch(() => {
          content.innerHTML = '<p style="color:#57606a">Pick or drop a <code>.md</code> file to view it.</p>';
          drop.classList.remove('hide');
        });
    }
    tryFetch();

    // 2) File picker fallback (works by just double-clicking this HTML)
    document.getElementById('file').addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => render(ev.target.result);
      reader.readAsText(f);
    });

    document.getElementById('reload').addEventListener('click', tryFetch);

    // 3) Drag & drop
    ['dragover', 'drop'].forEach(evt =>
      document.addEventListener(evt, e => { e.preventDefault(); }, false));
    document.addEventListener('drop', e => {
      const f = e.dataTransfer.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => render(ev.target.result);
      reader.readAsText(f);
    });
  </script>
</body>
</html>
